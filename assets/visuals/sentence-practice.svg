<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Sentence practice</title>
  <desc id="desc">A polished sentence building visual.</desc>
  <defs>
